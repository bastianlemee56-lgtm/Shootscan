<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 80" role="img">
  <title>Logo Shootscan</title>

  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00D68A"/>
      <stop offset="100%" stop-color="#00B874"/>
    </linearGradient>
    <clipPath id="iconClip">
      <rect x="0" y="0" width="80" height="80" rx="14"/>
    </clipPath>
  </defs>

  <!-- Bloc icône -->
  <rect x="0" y="0" width="80" height="80" rx="14" fill="#0A1A10"/>

  <g clip-path="url(#iconClip)">
    <rect x="0" y="38" width="80" height="2" fill="url(#g1)" opacity="0.9">
      <animate attributeName="y" values="10;68;10" dur="2.4s" repeatCount="indefinite" calcMode="ease-in-out"/>
      <animate attributeName="opacity" values="0.9;0.4;0.9" dur="2.4s" repeatCount="indefinite"/>
    </rect>
    <text x="40" y="52" font-family="Arial Black, sans-serif" font-size="32" font-weight="900" fill="url(#g1)" text-anchor="middle">S</text>
  </g>

  <!-- Coins viseur -->
  <path d="M12 22 L12 10 L24 10" fill="none" stroke="url(#g1)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M68 22 L68 10 L56 10" fill="none" stroke="url(#g1)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M12 58 L12 70 L24 70" fill="none" stroke="url(#g1)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M68 58 L68 70 L56 70" fill="none" stroke="url(#g1)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Texte -->
  <text x="96" y="48" font-family="Arial Black, Helvetica Neue, sans-serif" font-size="30" font-weight="900" letter-spacing="-0.5">
    <tspan fill="#0A1A10">Shoot</tspan><tspan fill="url(#g1)">scan</tspan>
  </text>
  <text x="97" y="64" font-family="Helvetica Neue, Arial, sans-serif" font-size="9" font-weight="400" fill="#4A7A58" letter-spacing="3">AI VALUATION</text>
</svg>