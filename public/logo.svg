<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 80">
  <defs>
    <clipPath id="iconClip">
      <rect x="0" y="0" width="80" height="80" rx="14"/>
    </clipPath>
  </defs>

  <!-- Fond icône -->
  <rect x="0" y="0" width="80" height="80" rx="14" fill="#0A1A10"/>

  <g clip-path="url(#iconClip)">
    <!-- Ligne de scan animée -->
    <rect x="0" y="38" width="80" height="2" fill="#00B874" opacity="0.9">
      <animate attributeName="y" values="10;68;10" dur="2.4s" repeatCount="indefinite" calcMode="ease-in-out"/>
      <animate attributeName="opacity" values="0.9;0.4;0.9" dur="2.4s" repeatCount="indefinite"/>
    </rect>
    <!-- S -->
    <text x="40" y="52" font-family="Arial Black, sans-serif" font-size="32" font-weight="900" fill="#00B874" text-anchor="middle">S</text>
  </g>

  <!-- Coins viseur -->
  <path d="M12 22 L12 10 L24 10" fill="none" stroke="#00B874" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M68 22 L68 10 L56 10" fill="none" stroke="#00B874" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M12 58 L12 70 L24 70" fill="none" stroke="#00B874" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M68 58 L68 70 L56 70" fill="none" stroke="#00B874" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Texte -->
  <text x="96" y="50" font-family="Arial Black, sans-serif" font-size="30" font-weight="900">
    <tspan fill="#0A1A10">Shoot</tspan><tspan fill="#00B874">scan</tspan>
  </text>
  <text x="97" y="66" font-family="Arial, sans-serif" font-size="9" fill="#4A7A58" letter-spacing="3">AI VALUATION</text>
</svg>