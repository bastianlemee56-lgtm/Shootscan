<svg xmlns="http://www.w3.org/2000/svg" width="400" height="160" viewBox="0 0 680 160" role="img">
  <title>Logo Shootscan</title>
  <desc>Logo Shootscan - IA d'estimation de valeur d'objets</desc>

  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00D68A"/>
      <stop offset="100%" stop-color="#00B874"/>
    </linearGradient>
    <clipPath id="iconClip">
      <rect x="20" y="20" width="120" height="120" rx="20"/>
    </clipPath>
  </defs>

  <rect x="20" y="20" width="120" height="120" rx="20" fill="#0A1A10"/>

  <g clip-path="url(#iconClip)">
    <rect x="20" y="78" width="120" height="2.5" fill="url(#g1)" opacity="0.9">
      <animate attributeName="y" values="42;134;42" dur="2.4s" repeatCount="indefinite" calcMode="ease-in-out"/>
      <animate attributeName="opacity" values="0.9;0.4;0.9" dur="2.4s" repeatCount="indefinite"/>
    </rect>
    <text x="80" y="98" font-family="Arial Black, sans-serif" font-size="50" font-weight="900" fill="url(#g1)" text-anchor="middle" opacity="0.95">S</text>
    <circle cx="80" cy="80" r="2.5" fill="#00D68A" opacity="0.7">
      <animate attributeName="opacity" values="0.7;0.2;0.7" dur="2.4s" repeatCount="indefinite"/>
    </circle>
  </g>

  <path d="M40 55 L40 37 L58 37" fill="none" stroke="url(#g1)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M120 55 L120 37 L102 37" fill="none" stroke="url(#g1)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M40 105 L40 123 L58 123" fill="none" stroke="url(#g1)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M120 105 L120 123 L102 123" fill="none" stroke="url(#g1)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>

  <text x="158" y="85" font-family="Arial Black, Helvetica Neue, sans-serif" font-size="42" font-weight="900" letter-spacing="-1">
    <tspan fill="#0A1A10">Shoot</tspan><tspan fill="url(#g1)">scan</tspan>
  </text>

  <text x="159" y="110" font-family="Helvetica Neue, Arial, sans-serif" font-size="11" font-weight="400" fill="#4A7A58" letter-spacing="3">AI VALUATION</text>
</svg>